name: release
on:
  release:
    types: [created, edited]

permissions:
  contents: read

env:
  GO_VERSION: 1.25

  SUFFIX: ${{ github.event.release.prerelease && '-prerelease' || '' }}
  RELEASE_NAME: ${{ github.event.release.name }}

jobs:
  publish-manifest:
    name: publish manfiest
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
      - name: setup go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # ratchet:actions/setup-go@v6.5.0
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: 'go.sum'
      - name: generate manifest
        run: |
          make build-installer OCULAR_VERSION="$RELEASE_NAME$SUFFIX"
          mv dist/install.yaml ocular${SUFFIX}.yaml
      - name: Upload Release Asset
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # ratchet:softprops/action-gh-release@v3.0.1
        with:
          files: ocular${{ env.SUFFIX }}.yaml
  publish-docker:
    name: publish docker image
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [controller, sidecar, scheduler]
    permissions:
      packages: write
      contents: read
      #      id-token: write
    steps:
      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # ratchet:docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Chalk
        uses: crashappsec/setup-chalk-action@0966e85f08bfbabbe3075892881331384819cbc5 # ratchet:crashappsec/setup-chalk-action@v0.0.3
        continue-on-error: true
      - name: setup qemu
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # ratchet:docker/setup-qemu-action@v4.2.0
      - name: setup buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # ratchet:docker/setup-buildx-action@v4.1.0
      - name: docker build
        id: docker-build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # ratchet:docker/build-push-action@v7.3.0
        with:
          platforms: linux/arm64,linux/amd64,linux/s390x,linux/ppc64le
          push: true
          build-args: |
            COMMAND=${{ matrix.image }}
            LDFLAGS=-s -w -X main.version=${{ github.event.release.tag_name }} -X main.buildTime=${{steps.date.outputs.date}} -X main.gitCommit=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/ocular-${{ matrix.image }}:${{ env.RELEASE_NAME }}${{ env.SUFFIX }}
            ghcr.io/${{ github.repository_owner }}/ocular-${{ matrix.image }}:latest${{ env.SUFFIX }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
