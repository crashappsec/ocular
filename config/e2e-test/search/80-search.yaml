---
# Will run a search that should start pipelines
# that will all validate the 
---
apiVersion: ocular.crashoverride.run/v1beta1
kind: Search
metadata:
  name: e2e-test
  namespace: e2e-test-search
spec:
  crawlerRef:
    name: validate-crawler
    parameters:
      - name: "RESOURCE"
        value: "CRAWLER"
  ttlSecondsAfterFinished: 3600
  scheduler:
    intervalSeconds: 3
    pipelineTemplate:
      spec:
        profileRef:
          name: validate-scanners
          parameters:
            - name: "TEST_INCLUDE"
              value: ""
            - name: "SCANNER_TEST"
              value: "PASS"
        downloaderRef:
          name: git-clone
          parameters:
            - name: TEST_PARAM
              value: "PASS"
        ttlSecondsMaxLifetime: 3600
