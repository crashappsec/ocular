resources:
  - ../default

images:
  - name: ghcr.io/crashappsec/ocular-controller
    newTag: e2e-test
    newName: host.local/library/ocular-controller

configMapGenerator:
  - name: controller-manager-config
    behavior: merge
    literals:
      - OCULAR_SIDECAR_IMG=host.local/library/ocular-sidecar:e2e-test
      - OCULAR_SCHEDULER_IMG=host.local/library/ocular-scheduler:e2e-test
