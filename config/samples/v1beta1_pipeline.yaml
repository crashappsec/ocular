apiVersion: ocular.crashoverride.run/v1beta1
kind: Pipeline
metadata:
  name: pipeline-sample
  labels:
    app.kubernetes.io/name: ocular
    app.kubernetes.io/managed-by: kustomize
spec:
  downloaderRef:
    name: downloader-sample
    kind: "Downloader" # can be Downloader or ClusterDownloader. empty defaults to 'Downloader'
    parameters:
      - name: "BARE_CLONE"
        value: "1"
  profileRef:
    name: profile-sample
  target:
    identifier: "https://github.com/crashappsec/chalk"    
  ttlSecondsAfterFinished: 180 # 3 minutes
